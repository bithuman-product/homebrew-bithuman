// bithuman_avatar — Android plugin module (elevate-frames path).
//
// Minimal revival of the retired android platform (full converse plugin
// remains in archive/android/ — see REVIVAL.md): this module implements the
// 'ai.bithuman.avatar' channel for the Elevate FRAMES path only, backed by
// ai.bithuman:libelevate-android (le_core JNI over the m4b ONNX graph,
// built/published from bithuman-sdk engine/elevate/runtime-cpu/android —
// mavenLocal for now, Maven Central on release).

group = 'ai.bithuman.flutter'
version = '0.1.0'

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.2'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21'
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
        mavenLocal()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace = 'ai.bithuman.flutter'
    compileSdk = 35

    defaultConfig {
        minSdk = 29
        ndk { abiFilters 'arm64-v8a' }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'ai.bithuman:libelevate-android:0.1.0'
}
