name: bithuman
description: "The bitHuman avatar umbrella Flutter plugin (macOS · iOS) — engine-agnostic glue + the single libconverse module-map xcframework; statically aggregates N engine SDKs (expression-2, essence-2)."
version: 2.3.3
homepage: https://www.bithuman.ai
repository: https://github.com/bithuman-product/homebrew-bithuman
issue_tracker: https://github.com/bithuman-product/homebrew-bithuman/issues
documentation: https://docs.bithuman.ai/swift-sdk/overview

environment:
  sdk: ^3.11.5
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  web_socket_channel: ^3.0.3
  # Layer-0 shared engine contract (EngineDescriptor + kEngineRegistry). The
  # umbrella git-deps the canonical protocol package; lib/engine_registry.dart
  # re-exports it so the app reaches the registry via package:bithuman/… with the
  # frozen slugs as the single source of truth (design §1.2, M2).
  bithuman_engine_protocol:
    git:
      url: https://github.com/bithuman-product/bithuman-engine-protocol.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # bitHuman avatar plugin — Apple-only (macOS · iOS). Android was removed
  # 2026-06-30 (Apple Silicon focus). pluginClass registers the native plugin
  # for method channels; the native engine libs are bundled at build time.
  plugin:
    platforms:
      ios:
        pluginClass: BithumanPlugin
      macos:
        pluginClass: BithumanPlugin

  # To add assets to your plugin package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
