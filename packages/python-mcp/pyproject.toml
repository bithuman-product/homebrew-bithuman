[project]
name = "bithuman-mcp"
version = "0.3.2"
description = "DEPRECATED — use `bithuman mcp` in the bitHuman CLI. MCP server for the bitHuman AI avatar platform."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "bitHuman", email = "hello@bithuman.ai" }]
keywords = ["bithuman", "mcp", "model-context-protocol", "avatar", "ai", "tts", "agent"]
classifiers = [
    "Development Status :: 7 - Inactive",
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
]
dependencies = [
    "mcp[cli]>=1.2.0",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://bithuman.ai"
Documentation = "https://docs.bithuman.ai"
Source = "https://github.com/bithuman-product/bithuman-sdk-public/tree/main/mcp"

[project.scripts]
bithuman-mcp = "bithuman_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bithuman_mcp"]
