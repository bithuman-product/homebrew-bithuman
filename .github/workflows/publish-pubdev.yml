# Publish the `bithuman` Flutter plugin (iOS + macOS) to pub.dev via Automated
# Publishing (GitHub Actions OIDC). NO stored token/secret: pub.dev mints a
# short-lived credential after verifying a GitHub OIDC id-token whose claims
# match the (repository, tag-pattern) tuple configured once at:
#
#   https://pub.dev/packages/bithuman/admin   (Automated publishing)
#       Repository:   bithuman-product/homebrew-bithuman
#       Tag pattern:  flutter-v{{version}}
#
# The Layer-0 engine contract is INLINED in the plugin (lib/src/engine_protocol.dart,
# re-exported by lib/engine_registry.dart) — there is no separate
# `bithuman_engine_protocol` pub.dev package to publish first. One package, one tag.
#
# The pub client auto-detects the GitHub Actions OIDC environment (reads the
# ACTIONS_ID_TOKEN_REQUEST_* env vars that `id-token: write` exposes, fetches an
# id-token with audience https://pub.dev, exchanges it for a temporary publishing
# credential) — no explicit auth step.
#
# Release flow:
#   1. Bump `version` in packages/flutter-plugin/pubspec.yaml on main.
#   2. git tag flutter-v2.3.3 && git push origin flutter-v2.3.3
#   The tag's version MUST equal the pubspec version (the guard enforces it).
#
# WARNING: pub.dev publishes are PERMANENT and immutable — a version can never be
# overwritten or deleted (at most "retracted"). Tag deliberately.
name: Publish to pub.dev

on:
  push:
    tags:
      - 'flutter-v*'   # → bithuman

permissions:
  contents: read

jobs:
  publish-flutter-plugin:
    if: startsWith(github.ref, 'refs/tags/flutter-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required to mint the pub.dev OIDC credential
    defaults:
      run:
        working-directory: packages/flutter-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Verify tag matches pubspec version
        run: |
          PKG_VERSION=$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}')
          TAG_VERSION="${GITHUB_REF_NAME#flutter-v}"
          echo "package=$PKG_VERSION tag=$TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pubspec version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Publish to pub.dev
        run: dart pub publish --force
