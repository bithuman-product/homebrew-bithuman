# Publish bithuman-mcp to PyPI (token auth — the bithuman PyPI token covers mcp).
#
# Release flow:
#   1. Bump `version` in packages/python-mcp/pyproject.toml on main.
#   2. Tag: `git tag mcp-v0.3.0 && git push origin mcp-v0.3.0` (the guard checks
#      the tag matches pyproject), OR run via workflow_dispatch with publish=true.
# A push/PR or a plain dispatch (publish=false) BUILDS but never uploads.
#
# Secrets (on homebrew-bithuman): PYPI_API_TOKEN (the token), PYPI_USERNAME (__token__).
name: Publish bithuman-mcp

on:
  push:
    tags:
      - 'mcp-v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Upload to PyPI (twine --skip-existing). Off = build-only dry run.'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#mcp-v}"
          echo "package=$PKG_VERSION tag=$TAG_VERSION"
          [ "$PKG_VERSION" = "$TAG_VERSION" ] || { echo "::error::Tag $GITHUB_REF_NAME != pyproject $PKG_VERSION"; exit 1; }

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build

      - name: Publish to PyPI
        # ONLY on a tag push, or an explicit dispatch with publish=true. A plain
        # push / PR / dispatch builds but never uploads (no casual publish).
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --skip-existing --verbose dist/*
